[package]
name = "mvr-gdtf"
version.workspace = true
edition.workspace = true

[features]
default = []
mvr = ["gdtf"]
gdtf = []
xchange = ["mvr", "gdtf", "dep:flume", "dep:local-ip-address", "dep:mdns-sd", "dep:serde_json"]

[dependencies]
quick-xml = { version = "0.39.2", features = ["serialize"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", optional = true }
uuid = { version = "1.21.0", features = ["serde", "v4"] }
zip = { version = "8.1.0", default-features = false, features = ["deflate"] }
mdns-sd = { version = "0.11", optional = true }
local-ip-address = { version = "0.6.10", optional = true }
flume = { version = "0.12.0", optional = true }

thiserror = "2.0.18"
bytes = "1.11.1"
log = "0.4.29"


[lints]
workspace = true

[[example]]
name = "xchange_client"
required-features = ["xchange"]

[dev-dependencies]
pretty_env_logger = "0.5.0"
